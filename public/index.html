<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Health Companion</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#5f9cff,#7d5fff);
}

.chat{
  width:400px;
  height:560px;
  background:white;
  border-radius:22px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.header{
  background:linear-gradient(135deg,#6c63ff,#5f9cff);
  color:white;
  padding:18px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

.messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
  animation:fade .3s ease;
  white-space:pre-wrap;
}

@keyframes fade{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

.user{
  background:#dbeafe;
  margin-left:auto;
  border-bottom-right-radius:5px;
}

.bot{
  background:#f1f5f9;
  border-bottom-left-radius:5px;
}

.input{
  display:flex;
  padding:12px;
  border-top:1px solid #eee;
}

input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
  outline:none;
  font-size:14px;
}

button{
  margin-left:8px;
  border:none;
  background:#6c63ff;
  color:white;
  padding:12px 18px;
  border-radius:25px;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>

<body>

<div class="chat">
  <div class="header">🤖 AI Health Companion</div>

  <div class="messages" id="messages">
    <div class="msg bot">Hello 👋 I'm your AI health companion.</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Type your message..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const input = document.getElementById("input");

input.addEventListener("keypress",function(e){
  if(e.key==="Enter") send();
});

async function send(){
  const text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  const typing = add("Typing...","bot");

  const res = await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  const data = await res.json();
  typing.remove();
  add(data.reply,"bot");
}

function add(text,type){
  const msg=document.createElement("div");
  msg.className="msg "+type;
  msg.innerText=text;
  document.getElementById("messages").appendChild(msg);

  // ⭐ auto scroll
  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;

  return msg;
}
</script>

</body>
</html>
